info:
  contact: {}
  description: This is a golyadmin Server
  title: Swagger API
  version: 0.0.1
paths:
  /base/captcha:
    get:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: 生成验证码,返回包括随机数id,base64,验证码长度,是否开启验证码
          schema:
            allOf:
            - $ref: '#/definitions/response.StructResponse'
